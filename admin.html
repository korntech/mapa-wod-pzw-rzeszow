<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel operatora — Wody PZW Rzeszów</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{--blue:#1565c0;--dark:#0d3b66;}
*{box-sizing:border-box;margin:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;height:100vh;display:flex;flex-direction:column}
header{background:var(--dark);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;z-index:1001}
header h1{font-size:16px;font-weight:600}
header small{opacity:.75}
#who{margin-left:auto;font-size:13px;display:flex;align-items:center;gap:10px}
button{font-family:inherit}
.btn{background:#fff;color:var(--dark);border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600}
.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}
.btn.danger{background:#c62828;color:#fff}
.btn.primary{background:var(--blue);color:#fff}
.btn:disabled{opacity:.5;cursor:default}
#main{flex:1;display:flex;min-height:0}
#side{width:340px;background:#f7f9fb;border-right:1px solid #ddd;display:flex;flex-direction:column;min-height:0}
#search{margin:10px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px}
#count{font-size:12px;color:#666;padding:0 12px 6px}
#list{flex:1;overflow-y:auto;padding:6px}
.item{padding:8px 10px;border-radius:8px;cursor:pointer;border-bottom:1px solid #eee}
.item:hover{background:#e8f1fa}
.item.sel{background:#d6e8fa}
.item b{font-size:13.5px}
.item .meta{font-size:11.5px;color:#666}
.item .warn{color:#b26a00;font-size:11px}
#map{flex:1}
#editor{position:absolute;top:0;right:0;width:360px;max-width:90vw;height:100%;background:#fff;box-shadow:-2px 0 12px rgba(0,0,0,.15);z-index:1200;display:none;flex-direction:column}
#editor.open{display:flex}
#editor .ehead{background:var(--dark);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px}
#editor .ehead h2{font-size:15px;flex:1}
#editor .ebody{padding:14px;overflow-y:auto;flex:1}
#editor label{display:block;font-size:12px;color:#555;margin:10px 0 3px;font-weight:600}
#editor input[type=text],#editor textarea{width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:7px;font-size:13.5px;font-family:inherit}
#editor textarea{min-height:90px;resize:vertical}
#editor .row{display:flex;gap:8px}
#editor .row>div{flex:1}
#editor .chk{display:flex;align-items:center;gap:7px;margin-top:12px;font-size:13px;color:#444}
#editor .hint{font-size:11.5px;color:#777;margin-top:4px}
#editor .efoot{padding:12px 14px;border-top:1px solid #eee;display:flex;gap:8px}
#editor .efoot .btn{flex:1;text-align:center;padding:9px}
#overlay{position:fixed;inset:0;background:rgba(13,59,102,.92);z-index:3000;display:flex;align-items:center;justify-content:center}
#overlay.hidden{display:none}
.card{background:#fff;border-radius:14px;padding:26px;width:340px;max-width:92vw}
.card h2{font-size:18px;margin-bottom:4px;color:var(--dark)}
.card p{font-size:13px;color:#666;margin-bottom:14px}
.card label{display:block;font-size:12px;color:#555;margin:10px 0 3px;font-weight:600}
.card input{width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px}
.card .btn{width:100%;margin-top:16px;padding:11px}
.msg{font-size:13px;margin-top:12px;min-height:18px}
.msg.err{color:#c62828}
.msg.ok{color:#2e7d32}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0d3b66;color:#fff;padding:10px 18px;border-radius:10px;font-size:13.5px;z-index:4000;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}
@media(max-width:720px){#side{width:46%}#editor{width:100%}}
</style>
</head>
<body>
<header>
 <h1>🛠️ Panel operatora — Wody PZW Rzeszów</h1>
 <small>edycja łowisk</small>
 <div id="who">
  <a class="btn ghost" href="index.html" target="_blank">🗺️ Mapa publiczna</a>
  <span id="email"></span>
  <button class="btn ghost" id="logout">Wyloguj</button>
 </div>
</header>

<div id="main">
 <div id="side">
  <input id="search" placeholder="Szukaj łowiska…">
  <div id="count"></div>
  <div id="list"></div>
  <div style="padding:10px;border-top:1px solid #ddd">
   <button class="btn primary" id="addbtn" style="width:100%;padding:10px">➕ Dodaj łowisko</button>
  </div>
 </div>
 <div id="map"></div>
 <div id="editor">
  <div class="ehead"><h2 id="etitle">Edycja</h2><button class="btn ghost" id="eclose">✕</button></div>
  <div class="ebody">
   <label>Nazwa</label>
   <input type="text" id="f_n" placeholder="np. Zbiornik Blizne">
   <div class="row">
    <div><label>Powierzchnia (ha)</label><input type="text" id="f_ha" placeholder="np. 3,00"></div>
    <div><label>Typ</label><input type="text" id="f_t" placeholder="np. Zbiornik zaporowy"></div>
   </div>
   <label>Zasady</label>
   <textarea id="f_r" placeholder="Obowiązujące zasady połowu…"></textarea>
   <label class="chk"><input type="checkbox" id="f_a"> Lokalizacja przybliżona (⚠)</label>
   <div class="row" style="margin-top:12px">
    <div><label>Szerokość (lat)</label><input type="text" id="f_lat"></div>
    <div><label>Długość (lon)</label><input type="text" id="f_lon"></div>
   </div>
   <div class="hint">Przeciągnij pinezkę na mapie, aby ustawić dokładne położenie — pole „przybliżona” zostanie automatycznie odznaczone.</div>
  </div>
  <div class="efoot">
   <button class="btn danger" id="edel">🗑 Usuń</button>
   <button class="btn primary" id="esave">💾 Zapisz</button>
  </div>
 </div>
</div>

<div id="overlay">
 <div class="card">
  <h2>Logowanie operatora</h2>
  <p>Dostęp tylko dla operatorów Okręgu PZW Rzeszów.</p>
  <form id="loginform">
   <label>E-mail</label>
   <input type="email" id="l_email" autocomplete="username" required>
   <label>Hasło</label>
   <input type="password" id="l_pass" autocomplete="current-password" required>
   <button class="btn primary" type="submit" id="loginbtn">Zaloguj</button>
  </form>
  <div class="msg" id="loginmsg"></div>
 </div>
</div>

<div id="toast"></div>

<script>
const CFG = window.PZW_CONFIG || {};
const $ = id => document.getElementById(id);
let sb = null, items = [], markers = {}, selId = null, addMode = false, map, layer, draftMarker = null;

function toast(t){ const e=$('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2200); }

if(!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY){
 $('overlay').innerHTML = '<div class="card"><h2>Brak konfiguracji</h2><p>Uzupełnij <b>config.js</b> wartościami z panelu Supabase (Project URL i klucz anon), aby włączyć panel operatora.</p></div>';
} else {
 sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
 initMap();
 sb.auth.getSession().then(({data})=>{ if(data.session) onLogin(data.session); });
}

function initMap(){
 map = L.map('map').setView([50.08, 21.95], 9);
 map.attributionControl.setPrefix('<a href="https://leafletjs.com">Leaflet</a>');
 const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:19, attribution:'© Esri'}).addTo(map);
 const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap'});
 L.control.layers({"Satelita":sat,"Mapa":osm}).addTo(map);
 layer = L.layerGroup().addTo(map);
 map.on('click', e=>{ if(addMode) placeDraft(e.latlng); });
}

// --- LOGOWANIE ---
$('loginform').addEventListener('submit', async ev=>{
 ev.preventDefault();
 $('loginbtn').disabled = true; $('loginmsg').className='msg'; $('loginmsg').textContent='Logowanie…';
 const { data, error } = await sb.auth.signInWithPassword({ email:$('l_email').value.trim(), password:$('l_pass').value });
 $('loginbtn').disabled = false;
 if(error){ $('loginmsg').className='msg err'; $('loginmsg').textContent='Błąd logowania: '+error.message; return; }
 onLogin(data.session);
});

function onLogin(session){
 $('overlay').classList.add('hidden');
 $('email').textContent = session.user.email;
 loadAll();
}

$('logout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

// --- DANE ---
async function loadAll(){
 const { data, error } = await sb.from('zbiorniki').select('*').order('n');
 if(error){ toast('Błąd wczytywania: '+error.message); return; }
 items = data; renderList(); renderMarkers();
}

function renderMarkers(){
 layer.clearLayers(); markers = {};
 items.forEach(z=>{
  const m = L.circleMarker([z.lat,z.lon], {radius:7,color:'#fff',weight:2,fillColor: z.a? '#b26a00':'#1565c0',fillOpacity:.95});
  m.on('click', ()=>select(z.id));
  m.addTo(layer); markers[z.id]=m;
 });
}

function renderList(){
 const q = $('search').value.trim().toLowerCase();
 const f = items.filter(z=> !q || (z.n+' '+(z.t||'')).toLowerCase().includes(q));
 $('count').textContent = f.length+' łowisk'+(q?` (z ${items.length})`:'');
 $('list').innerHTML = f.map(z=>`<div class="item${z.id===selId?' sel':''}" data-id="${z.id}"><b>${esc(z.n)}</b>${z.a?' <span class="warn">⚠</span>':''}<div class="meta">${esc(z.t||'')} · ${esc(z.ha||'—')} ha</div></div>`).join('');
}
$('search').addEventListener('input', renderList);
$('list').addEventListener('click', e=>{ const it=e.target.closest('.item'); if(it) select(+it.dataset.id); });

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// --- WYBÓR / EDYCJA ---
function select(id){
 cancelDraft();
 selId = id;
 const z = items.find(x=>x.id===id); if(!z) return;
 fillForm(z, 'Edycja łowiska');
 map.setView([z.lat,z.lon], Math.max(map.getZoom(),14));
 makeDraggable(id);
 renderList();
 $('editor').classList.add('open');
}

function fillForm(z, title){
 $('etitle').textContent = title;
 $('f_n').value=z.n||''; $('f_ha').value=z.ha||''; $('f_t').value=z.t||'';
 $('f_r').value=z.r||''; $('f_a').checked=!!z.a;
 $('f_lat').value=z.lat; $('f_lon').value=z.lon;
 $('edel').style.display = z.id ? '' : 'none';
}

function makeDraggable(id){
 Object.entries(markers).forEach(([mid,m])=>{
  if(+mid===id){
   const dm = L.marker([items.find(x=>x.id===id).lat, items.find(x=>x.id===id).lon], {draggable:true}).addTo(layer);
   m.remove(); markers[id]=dm;
   dm.on('drag', ()=>{ const p=dm.getLatLng(); $('f_lat').value=p.lat.toFixed(5); $('f_lon').value=p.lng.toFixed(5); $('f_a').checked=false; });
  }
 });
}

// --- DODAWANIE ---
$('addbtn').addEventListener('click', ()=>{
 cancelDraft(); selId=null;
 addMode = true;
 toast('Kliknij na mapie miejsce nowego łowiska');
 $('addbtn').textContent='📍 Kliknij na mapie…';
});

function placeDraft(latlng){
 addMode=false; $('addbtn').textContent='➕ Dodaj łowisko';
 if(draftMarker) draftMarker.remove();
 draftMarker = L.marker(latlng,{draggable:true}).addTo(map);
 draftMarker.on('drag', ()=>{ const p=draftMarker.getLatLng(); $('f_lat').value=p.lat.toFixed(5); $('f_lon').value=p.lng.toFixed(5); });
 fillForm({n:'',ha:'',t:'',r:'',a:0,lat:latlng.lat.toFixed(5),lon:latlng.lng.toFixed(5)}, 'Nowe łowisko');
 $('editor').classList.add('open');
}

function cancelDraft(){ if(draftMarker){ draftMarker.remove(); draftMarker=null; } addMode=false; $('addbtn').textContent='➕ Dodaj łowisko'; }

$('eclose').addEventListener('click', ()=>{ $('editor').classList.remove('open'); cancelDraft(); selId=null; loadAll(); });

// --- ZAPIS ---
$('esave').addEventListener('click', async ()=>{
 const lat=parseFloat($('f_lat').value), lon=parseFloat($('f_lon').value);
 if(!$('f_n').value.trim()){ toast('Podaj nazwę'); return; }
 if(isNaN(lat)||isNaN(lon)){ toast('Niepoprawne współrzędne'); return; }
 const rec = { n:$('f_n').value.trim(), ha:$('f_ha').value.trim()||'—', t:$('f_t').value.trim(), r:$('f_r').value.trim(), a:$('f_a').checked?1:0, lat, lon };
 $('esave').disabled=true;
 let error;
 if(selId){ ({error} = await sb.from('zbiorniki').update(rec).eq('id',selId)); }
 else { ({error} = await sb.from('zbiorniki').insert(rec)); }
 $('esave').disabled=false;
 if(error){ toast('Błąd zapisu: '+error.message); return; }
 toast('Zapisano'); $('editor').classList.remove('open'); cancelDraft(); selId=null; loadAll();
});

// --- USUWANIE ---
$('edel').addEventListener('click', async ()=>{
 if(!selId) return;
 if(!confirm('Usunąć to łowisko? Operacji nie można cofnąć.')) return;
 const { error } = await sb.from('zbiorniki').delete().eq('id',selId);
 if(error){ toast('Błąd usuwania: '+error.message); return; }
 toast('Usunięto'); $('editor').classList.remove('open'); selId=null; loadAll();
});
</script>
</body>
</html>
